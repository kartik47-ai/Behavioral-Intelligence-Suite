<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Authenticity Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg">
    <div class="orb orb-two"></div>
    <div class="orb orb-three"></div>

    <div class="card wide-card lie-detector-card">
        <div class="hero-row">
            <div>
                <span class="eyebrow">Module 01</span>
                <h2>Response Authenticity Analyzer</h2>
                <p class="subtitle">Adaptive, difficulty-aware assessment using timing, hesitation, consistency, and category risk.</p>
            </div>
            <button class="ghost-btn" onclick="window.location='dashboard.html'">Back</button>
        </div>

        <div class="toolbar">
            <select id="difficultySelect">
                <option value="easy">Easy baseline</option>
                <option value="standard" selected>Standard</option>
                <option value="high-pressure">High pressure</option>
            </select>
            <button class="ghost-btn" onclick="restartSession()">Restart session</button>
        </div>

        <div class="live-meter-container">
            <div class="live-meter-label">Live confidence signal</div>
            <div class="live-meter-bar">
                <div id="liveMeter" class="live-meter-fill"></div>
            </div>
            <div id="liveTruth" class="live-truth-value">100%</div>
            <div id="liveAnalysis" class="live-analysis-text">Calibration in progress.</div>
        </div>

        <div class="question-container">
            <div class="question-content full-width">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="question-count" id="qcount"></p>
                <h3 id="q" class="question-text"></h3>
                <p class="mini-copy" id="qCategory"></p>
            </div>
        </div>

        <div class="answer-options" id="answerOptions">
            <button class="answer-btn" onclick="selectAnswer('yes', event)">Yes</button>
            <button class="answer-btn" onclick="selectAnswer('no', event)">No</button>
        </div>

        <div id="questionFeedback" class="question-feedback"></div>
        <button class="confirm-btn" onclick="confirmAnswer()">Next question</button>

        <div class="timer-section">
            <h3 id="timer" class="timer-text"></h3>
        </div>

        <div id="resultContainer" class="result-container" style="display:none;">
            <div class="metrics-grid" id="metricCards"></div>
            <canvas id="chart" class="result-chart"></canvas>
            <div id="resultText"></div>
            <div class="toolbar">
                <button class="ghost-btn" onclick="downloadReport()">Download JSON report</button>
                <button class="ghost-btn" onclick="printReport()">Print or save as PDF</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
