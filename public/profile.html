<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Behavioral Response Analysis</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg">
    <div class="card wide-card">
        <div class="hero-row">
            <div>
                <span class="eyebrow">Module 05</span>
                <h2>User Profile</h2>
                <p class="subtitle">Your baseline metrics, benchmark standing, recent sessions, and action recommendations.</p>
            </div>
            <button class="ghost-btn" onclick="window.location='dashboard.html'">Back</button>
        </div>

        <div class="metrics-grid" id="profileMetrics"></div>

        <div class="chart-grid">
            <div class="panel">
                <h3>Recommendations</h3>
                <div id="recommendationList" class="panel-list"></div>
            </div>
            <div class="panel">
                <h3>Recent sessions</h3>
                <div id="recentSessions" class="panel-list"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const currentUser = requireAuth();
        if (currentUser) startSessionWatch();

        async function loadProfile() {
            const response = await authFetch("/profile-summary");
            const data = await response.json();

            document.getElementById("profileMetrics").innerHTML = `
                <div class="metric-card"><span>Name</span><strong>${data.user.name}</strong></div>
                <div class="metric-card"><span>Sessions logged</span><strong>${data.streak}</strong></div>
                <div class="metric-card"><span>Your average</span><strong>${data.benchmark.ownAverage}%</strong></div>
                <div class="metric-card"><span>Platform average</span><strong>${data.benchmark.platformAverage}%</strong></div>
            `;

            const modules = data.moduleAverages || {};
            const moduleItems = Object.keys(modules).length
                ? Object.entries(modules).map(([key, value]) => `<div class="list-item">${key}: score ${value.score}% | confidence ${value.confidence}%</div>`).join("")
                : `<div class="list-item">No module averages available yet.</div>`;

            document.getElementById("recommendationList").innerHTML = `
                ${data.recommendations.map((item) => `<div class="list-item">${item}</div>`).join("")}
                <div class="list-item"><strong>Module baselines</strong></div>
                ${moduleItems}
            `;

            document.getElementById("recentSessions").innerHTML = data.recentSessions.length
                ? data.recentSessions.map((row) => `<div class="list-item">${row.module} | ${row.score}% | ${new Date(row.timestamp).toLocaleString()}</div>`).join("")
                : `<div class="list-item">No recent sessions yet.</div>`;
        }

        loadProfile();
    </script>
</body>
</html>
