<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Behavioral Response Analysis</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg">
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>

    <div class="card auth-card" id="loginCard">
        <span class="eyebrow">Behavioral Analytics Platform</span>
        <h2>Login</h2>
        <p class="subtitle">Access protected dashboards, reports, trends, and admin analytics.</p>

        <form id="loginForm" class="stack-form">
            <input id="loginEmail" type="email" placeholder="Email" required>
            <input id="loginPassword" type="password" placeholder="Password" required>
            <button type="submit">Open dashboard</button>
        </form>

        <p class="switch-copy">New here? <a href="#" onclick="showRegister()">Create an account</a></p>
    </div>

    <div class="card auth-card" id="registerCard" style="display:none;">
        <span class="eyebrow">Create Profile</span>
        <h2>Register</h2>
        <p class="subtitle">The first account becomes the admin for platform-wide analytics.</p>

        <form id="registerForm" class="stack-form">
            <input id="regName" placeholder="Full name" required>
            <input id="regEmail" type="email" placeholder="Email" required>
            <input id="regPhone" placeholder="Phone" required>
            <input id="regPassword" type="password" placeholder="Password" required>
            <button type="submit">Create account</button>
        </form>

        <p class="switch-copy">Already registered? <a href="#" onclick="showLogin()">Go to login</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        const loginCard = document.getElementById("loginCard");
        const registerCard = document.getElementById("registerCard");

        if (getCurrentUser() && !sessionExpired()) {
            window.location = "dashboard.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("loginEmail").value.trim().toLowerCase();
            const password = document.getElementById("loginPassword").value.trim();

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            const response = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            });

            const data = await response.json();
            alert(data.message);

            if (data.success) {
                saveCurrentUser({
                    ...data.user,
                    token: data.token,
                    expiresAt: data.expiresAt
                });
                window.location = "dashboard.html";
            }
        });

        document.getElementById("registerForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                name: document.getElementById("regName").value.trim(),
                email: document.getElementById("regEmail").value.trim().toLowerCase(),
                phone: document.getElementById("regPhone").value.trim(),
                password: document.getElementById("regPassword").value.trim()
            };

            if (!payload.name || !payload.email || !payload.phone || !payload.password) {
                alert("All fields are required.");
                return;
            }

            const response = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `name=${encodeURIComponent(payload.name)}&email=${encodeURIComponent(payload.email)}&phone=${encodeURIComponent(payload.phone)}&password=${encodeURIComponent(payload.password)}`
            });

            const data = await response.json();
            alert(data.message);
            if (data.success) {
                document.getElementById("registerForm").reset();
                showLogin();
            }
        });

        function showRegister() {
            loginCard.style.display = "none";
            registerCard.style.display = "block";
        }

        function showLogin() {
            registerCard.style.display = "none";
            loginCard.style.display = "block";
        }
    </script>
</body>
</html>
